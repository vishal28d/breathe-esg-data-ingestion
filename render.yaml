databases:
  - name: breathe-db
    databaseName: breathe_esg
    user: breathe_user

services:
  - type: web
    name: breathe-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: "breathe-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
